name: Sign Executable

on:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: 3.9
  PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}

jobs:
  sign-executable:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install pyinstaller

    - name: Compile with PyInstaller
      run: |
        pyinstaller mecau.py

    - name: Create PFX
      run: |
        MakeCert -r -pe -n "CN=MecaUSecurity" -b 01/01/2000 -e 01/01/2030 -eku 1.3.6.1.5.5.7.3.3 -ss my -sr localMachine -sky signature -sp "Microsoft RSA SChannel Cryptographic Provider" -sy 12 certified-mecau.pfx

    - name: Sign Executable
      run: |
        signtool sign /f certified-mecau.pfx /p ${{ env.PFX_PASSWORD }} dist\mecau.exe
